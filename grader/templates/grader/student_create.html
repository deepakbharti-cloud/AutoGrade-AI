{% extends 'grader/base.html' %}{% block title %}Add Student{% endblock %}{% block page_title %}Add Student{% endblock %}{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
<div class="card"><div class="card-header">Student Details</div><div class="card-body">
<form method="post">{% csrf_token %}
<div class="mb-3"><label class="form-label">Full Name</label><input name="name" class="form-control" placeholder="e.g. Deepak Bharti" required></div>
<div class="mb-3"><label class="form-label">Roll Number</label><input name="roll_number" class="form-control" placeholder="e.g. 12" required></div>
<div class="mb-3"><label class="form-label">Class</label><input name="class_name" class="form-control" placeholder="e.g. 10-A"></div>
<div class="mb-3"><label class="form-label">Phone (WhatsApp) <small class="text-muted">— without +91</small></label><input name="phone" class="form-control" placeholder="e.g. 9876500000"></div>
<div class="d-flex gap-2">
<button type="submit" class="btn btn-primary">Add Student</button>
<a href="{% url 'student_list' %}" class="btn btn-outline-secondary">Cancel</a>
</div></form></div></div></div></div>{% endblock %}
